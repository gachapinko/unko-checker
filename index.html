<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>💩 うんこきろく</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #FFB7D5;
  --deep-pink: #FF69B4;
  --light: #FFF0F8;
  --purple: #E8C4F0;
  --yellow: #FFF3B0;
  --mint: #C8F0E4;
  --shadow: rgba(255,105,180,0.25);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  background: linear-gradient(135deg, #FFF0F8 0%, #F8E8FF 50%, #FFE8F4 100%);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ヘッダー */
header {
  text-align: center;
  padding: 24px 16px 8px;
}
header h1 {
  font-size: 1.8rem;
  font-weight: 900;
  background: linear-gradient(135deg, #FF69B4, #DA70D6, #FF69B4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  letter-spacing: 2px;
}
header p.sub {
  font-size: 0.75rem;
  color: #FF8EC5;
  margin-top: 2px;
  letter-spacing: 1px;
}

/* メインボタンエリア */
.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0 8px;
  position: relative;
}
.poop-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  position: relative;
  display: inline-block;
  -webkit-tap-highlight-color: transparent;
  filter: drop-shadow(0 8px 24px rgba(255,105,180,0.45));
  animation: float 3s ease-in-out infinite;
  transition: transform 0.1s, filter 0.1s;
}
.poop-btn:active {
  transform: scale(0.82) translateY(8px) !important;
  animation: none !important;
  filter: drop-shadow(0 2px 4px rgba(255,105,180,0.3));
}
.poop-btn.squish {
  animation: squish 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
}
.poop-btn img { width: 200px; height: 200px; object-fit: contain; display: block; }
@keyframes float {
  0%,100% { transform: translateY(0px); }
  50%      { transform: translateY(-12px); }
}
@keyframes squish {
  0%   { transform: scale(0.82) translateY(8px); filter: drop-shadow(0 2px 4px rgba(255,105,180,0.3)); }
  60%  { transform: scale(1.08) translateY(-6px); filter: drop-shadow(0 12px 28px rgba(255,105,180,0.5)); }
  80%  { transform: scale(0.97) translateY(0px); }
  100% { transform: scale(1) translateY(0px); filter: drop-shadow(0 8px 24px rgba(255,105,180,0.45)); }
}
.tap-label {
  font-size: 0.85rem;
  font-weight: 800;
  color: #FF8EC5;
  margin-top: 10px;
  letter-spacing: 2px;
  animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.45;} }

/* カウンター */
.counter-wrap {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 12px 16px;
  flex-wrap: wrap;
}
.counter-card {
  background: white;
  border-radius: 20px;
  padding: 10px 20px;
  box-shadow: 0 4px 16px var(--shadow);
  text-align: center;
  border: 2px solid #FFD6EB;
  min-width: 100px;
}
.counter-card .label {
  font-size: 0.65rem;
  font-weight: 700;
  color: #FFA0CC;
  letter-spacing: 1px;
}
.counter-card .num {
  font-size: 1.6rem;
  font-weight: 900;
  color: #FF69B4;
  line-height: 1.2;
}
.counter-card .unit {
  font-size: 0.7rem;
  color: #FFB7D5;
  font-weight: 700;
}

/* カレンダー */
.calendar-wrap {
  max-width: 420px;
  margin: 8px auto 32px;
  padding: 0 16px;
}
.calendar-card {
  background: white;
  border-radius: 28px;
  box-shadow: 0 8px 32px var(--shadow);
  padding: 20px;
  border: 2px solid #FFD6EB;
}
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.cal-title {
  font-size: 1.1rem;
  font-weight: 900;
  color: #FF69B4;
  letter-spacing: 1px;
}
.nav-btn {
  background: linear-gradient(135deg, #FFB7D5, #FF69B4);
  border: none;
  border-radius: 50%;
  width: 36px;
  height: 36px;
  font-size: 1rem;
  color: white;
  cursor: pointer;
  box-shadow: 0 2px 8px var(--shadow);
  transition: transform 0.15s;
  font-weight: 900;
}
.nav-btn:active { transform: scale(0.9); }
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}
.dow {
  text-align: center;
  font-size: 0.65rem;
  font-weight: 800;
  padding: 4px 0 6px;
}
.dow.sun { color: #FF6B9D; }
.dow.sat { color: #7EB8FF; }
.dow.week { color: #CCAABB; }
.cal-day {
  aspect-ratio: 1;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  color: #CC88AA;
  position: relative;
  transition: background 0.15s;
}
.cal-day.empty { opacity: 0; pointer-events: none; }
.cal-day.other-month { opacity: 0.3; }
.cal-day.today {
  background: linear-gradient(135deg, #FFB7D5, #FF69B4);
  color: white;
  box-shadow: 0 3px 10px rgba(255,105,180,0.4);
}
.cal-day.sunday .day-num { color: #FF6B9D; }
.cal-day.saturday .day-num { color: #7EB8FF; }
.cal-day.today .day-num { color: white; }
.day-num { font-size: 0.72rem; font-weight: 800; line-height: 1; }
.day-stamps {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}
.day-stamps img {
  width: 22px;
  height: 22px;
  object-fit: contain;
}
.cal-day.has-poop {
  flex-direction: column;
  justify-content: center;
  gap: 2px;
}
.cal-day.has-poop .day-num {
  font-size: 0.72rem;
  font-weight: 900;
  color: white;
  background: #FF8EC5;
  border-radius: 6px;
  padding: 1px 5px;
  line-height: 1.3;
}

/* レインアニメ */
.rain-container {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 9999;
  overflow: hidden;
}
.rain-poop {
  position: absolute;
  top: -80px;
  opacity: 0;
  animation: fall linear forwards;
}
.rain-poop img { display: block; }
@keyframes fall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  80%  { opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* フラッシュ */
.flash {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, rgba(255,182,213,0.6), transparent 70%);
  pointer-events: none;
  z-index: 9998;
  opacity: 0;
  transition: opacity 0.1s;
}
.flash.active { opacity: 1; transition: none; }

/* デコ */
.deco {
  text-align: center;
  font-size: 1.2rem;
  padding: 4px;
  letter-spacing: 4px;
  opacity: 0.5;
}

let viewYear, viewMonth;
const now = new Date();

function storageKey(y, m) { return 'poop_' + y + '_' + m; }

function getData(y, m) {
  try { return JSON.parse(localStorage.getItem(storageKey(y, m)) || '{}'); }
  catch(e) { return {}; }
}

function saveData(y, m, data) {
  localStorage.setItem(storageKey(y, m), JSON.stringify(data));
}

function playPoopSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  const t = ctx.currentTime;
  osc.type = 'sine';
  osc.frequency.setValueAtTime(140, t);
  osc.frequency.linearRampToValueAtTime(420, t + 0.07);
  osc.frequency.exponentialRampToValueAtTime(75, t + 0.38);
  gain.gain.setValueAtTime(0.7, t);
  gain.gain.setValueAtTime(0.7, t + 0.06);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
  osc.start(t);
  osc.stop(t + 0.45);
}

function recordPoop() {
  const y = now.getFullYear(), m = now.getMonth() + 1, d = now.getDate();
  const data = getData(y, m);
  data[d] = (data[d] || 0) + 1;
  saveData(y, m, data);
  renderCalendar();
  doSquish();
  doRain();
  doFlash();
  playPoopSound();
}

function doSquish() {
  const btn = document.getElementById('poopBtn');
  btn.classList.remove('squish');
  void btn.offsetWidth; // reflow
  btn.classList.add('squish');
  btn.addEventListener('animationend', () => {
    btn.classList.remove('squish');
  }, { once: true });
}

function changeMonth(delta) {
  viewMonth += delta;
  if (viewMonth > 12) { viewMonth = 1; viewYear++; }
  if (viewMonth < 1)  { viewMonth = 12; viewYear--; }
  renderCalendar();
}

function renderCalendar() {
  const y = viewYear, m = viewMonth;
  document.getElementById('calTitle').textContent = y + '年' + m + '月';

  const data = getData(y, m);
  const firstDay = new Date(y, m-1, 1).getDay();
  const daysInMonth = new Date(y, m, 0).getDate();
  const todayY = now.getFullYear(), todayM = now.getMonth()+1, todayD = now.getDate();

  const dows = ['日','月','火','水','木','金','土'];
  const dowClasses = ['sun','week','week','week','week','week','sat'];
  let html = '';
  dows.forEach((d,i) => {
    html += `<div class="dow ${dowClasses[i]}">${d}</div>`;
  });

  for (let i = 0; i < firstDay; i++) {
    html += '<div class="cal-day empty"></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dow = (firstDay + d - 1) % 7;
    const isToday = (y===todayY && m===todayM && d===todayD);
    const cnt = data[d] || 0;
    const hasPoop = cnt > 0;
    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (dow === 0) cls += ' sunday';
    if (dow === 6) cls += ' saturday';
    if (hasPoop) cls += ' has-poop';

    let inner = '';
    if (hasPoop) {
      inner = `<div class="day-num">${d}</div><div class="day-stamps"><img src="${STAMP_SRC}" alt="💩"></div>`;
    } else {
      inner = `<div class="day-num">${d}</div>`;
    }
    html += `<div class="${cls}">${inner}</div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
}

const RAIN_SRCS = [TINY_SRC, 'blue.PNG', 'green.PNG', 'purple.PNG'];

function doRain() {
  const container = document.getElementById('rainContainer');
  const count = 22;
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'rain-poop';
      const size = 30 + Math.random() * 40;
      const left = Math.random() * 100;
      const dur = 1.3 + Math.random() * 1.4;
      el.style.left = left + 'vw';
      el.style.animationDuration = dur + 's';
      const img = document.createElement('img');
      img.src = RAIN_SRCS[Math.floor(Math.random() * RAIN_SRCS.length)];
      img.style.width = size + 'px';
      img.style.height = size + 'px';
      el.appendChild(img);
      container.appendChild(el);
      setTimeout(() => el.remove(), (dur + 0.3) * 1000);
    }, i * 75);
  }
}

function doFlash() {
  const f = document.getElementById('flash');
  f.classList.add('active');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      f.classList.remove('active');
    });
  });
}

// 初期化
viewYear = now.getFullYear();
viewMonth = now.getMonth() + 1;
renderCalendar();
</script>
